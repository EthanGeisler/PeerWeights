# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name peerweights.com www.peerweights.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name peerweights.com www.peerweights.com;

    # SSL — certbot will fill these in
    ssl_certificate /etc/letsencrypt/live/peerweights.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/peerweights.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Max upload size (200GB model files)
    client_max_body_size 200G;

    # Longer timeouts for large uploads
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 60s;

    # API — reverse proxy to Node server
    location /api/ {
        proxy_pass http://127.0.0.1:7480;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for large uploads
        proxy_request_buffering off;
    }

    # Static web assets (built SPA)
    root /opt/peerweights/web/dist;
    index index.html;

    # BrowserRouter fallback — serve index.html for all non-API, non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
